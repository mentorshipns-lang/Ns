<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents</title>
<style>
body { 
    margin:0; 
    font-family: Arial,sans-serif; 
    background:#f0f8ff; 
}

/* Header */
header {
    background:#0B3D91;
    color:white;
    padding:15px 20px;
    display:flex;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
header h1 {
    margin:0;
    font-size:1.5em;
    flex-grow:1;
    text-align:center;
}
.back-symbol {
    font-size:1.4em;
    cursor:pointer;
    margin-right:10px;
    user-select:none;
}

/* Container for cards */
.container {
    max-width:800px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
    padding: 0 12px;
}
.button {
    display:flex;
    align-items:center;
    justify-content:center;
    background:white;
    color:#0B3D91;
    padding:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    transition: transform 0.2s, background 0.2s;
}
.button:hover { 
    transform:translateY(-3px); 
    background:#e6f2ff; 
}

/* Fullscreen document viewer */
#docViewer {
    display:none;
    position:fixed;
    top:0; 
    left:0;
    width:100%;
    height:100%;
    background:white;
    z-index:1000;
}
#docViewer iframe {
    width:100%;
    height:100%;
    border:none;
}

/* Viewer buttons */
#viewerActions {
    position:absolute;
    top:10px;
    right:10px;
    display:flex;
    gap:10px;
    z-index:1001;
}

.viewer-btn {
    border:none;
    padding:14px 16px;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

#downloadDoc {
    background:#0B3D91;
}
#downloadDoc:hover {
    background:#082f72;
}

#closeDoc {
    background:#f44336;
}
#closeDoc:hover { 
    background:#d32f2f; 
}

@media (max-width: 600px) {
    .container {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .button {
        padding: 16px;
        font-size: 14px;
    }

    header h1 {
        font-size: 1.3em;
    }

    .viewer-btn {
        padding:12px 14px;
        font-size:13px;
    }
}
</style>
</head>
<body>

<header>
    <span id="backBtn" class="back-symbol" style="display:none;">←</span>
    <h1>Documents</h1>
</header>

<div class="container" id="content"></div>

<div id="docViewer">
    <div id="viewerActions">
        <button id="downloadDoc" class="viewer-btn">Download ⬇</button>
        <button id="closeDoc" class="viewer-btn">Close ✖</button>
    </div>
    <iframe id="docIframe"></iframe>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDCsDOnbC1nUkN2qUCWnJwK-HVVW_uF-II",
  authDomain: "ns-mentorship.firebaseapp.com",
  projectId: "ns-mentorship",
  storageBucket: "ns-mentorship.firebasestorage.app",
  messagingSenderId: "593826834406",
  appId: "1:593826834406:web:a3c12ffebc61d3e92f5827",
  measurementId: "G-FD81Z0VQ1Q"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedTerm = null;
let selectedCourse = null;
let currentDocLink = "";

const content = document.getElementById("content");
const backBtn = document.getElementById("backBtn");
const docViewer = document.getElementById("docViewer");
const docIframe = document.getElementById("docIframe");
const closeDoc = document.getElementById("closeDoc");
const downloadDoc = document.getElementById("downloadDoc");

// Close document
closeDoc.onclick = () => {
    docViewer.style.display = "none";
    docIframe.src = "";
    currentDocLink = "";
};

// Download document
downloadDoc.onclick = () => {
    if (!currentDocLink) return;

    // Try direct download
    const a = document.createElement("a");
    a.href = currentDocLink;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.download = "";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
};

// Back button
backBtn.onclick = () => {
    if (docViewer.style.display === "block") {
        docViewer.style.display = "none";
        docIframe.src = "";
        currentDocLink = "";
        return;
    }

    if(selectedCourse){
        selectedCourse = null;
        loadDocuments();
    } else if(selectedTerm){
        selectedTerm = null;
        loadTerms();
    }
};

// Load all terms
function loadTerms(){
    content.innerHTML = "";
    backBtn.style.display = "none";

    db.collection("documents").get().then(snapshot=>{
        const terms = [...new Set(snapshot.docs.map(d => d.data().term))].sort((a,b)=>a-b);
        if(terms.length===0){ 
            content.innerHTML="<p style='padding:20px;text-align:center;'>No documents uploaded.</p>"; 
            return; 
        }

        terms.forEach(term=>{
            const btn = document.createElement("button");
            btn.className="button";
            btn.textContent="Term "+term;
            btn.onclick = () => { 
                selectedTerm = term; 
                selectedCourse = null;
                loadDocuments(); 
            };
            content.appendChild(btn);
        });
    }).catch(error => {
        console.error("Error loading terms:", error);
        content.innerHTML="<p style='padding:20px;text-align:center;color:red;'>Failed to load documents.</p>";
    });
}

// Load courses or documents
function loadDocuments(){
    content.innerHTML = "";
    backBtn.style.display = "inline-block";

    db.collection("documents")
      .where("term","==",selectedTerm)
      .get()
      .then(snapshot=>{
        if(snapshot.empty){ 
            content.innerHTML="<p style='padding:20px;text-align:center;'>No documents found for this term.</p>"; 
            return; 
        }

        if(!selectedCourse){
            // Show courses
            const courses = [...new Set(snapshot.docs.map(d=>d.data().course))].sort();

            if(courses.length === 0){
                content.innerHTML="<p style='padding:20px;text-align:center;'>No courses found.</p>";
                return;
            }

            courses.forEach(course=>{
                const btn = document.createElement("button");
                btn.className="button";
                btn.textContent=course;
                btn.onclick=()=>{ 
                    selectedCourse = course; 
                    loadDocuments(); 
                };
                content.appendChild(btn);
            });
        } else {
            // Show documents for this course
            const docs = snapshot.docs
                .filter(d=>d.data().course===selectedCourse)
                .sort((a,b)=>{
                    const oa = a.data().order||0, ob=b.data().order||0;
                    return oa-ob;
                });

            if(docs.length===0){ 
                content.innerHTML="<p style='padding:20px;text-align:center;'>No documents found for this course.</p>"; 
                return; 
            }

            docs.forEach(d=>{
                const data = d.data();
                const btn = document.createElement("button");
                btn.className="button";
                btn.textContent = data.order ? `${data.order}. ${data.title}` : data.title;
                btn.onclick = () => openDocument(data.link);
                content.appendChild(btn);
            });
        }
    }).catch(error => {
        console.error("Error loading documents:", error);
        content.innerHTML="<p style='padding:20px;text-align:center;color:red;'>Failed to load documents.</p>";
    });
}

// Open document full-screen
function openDocument(link){
    currentDocLink = link;
    docIframe.src = link;
    docViewer.style.display="block";
}

// INIT
loadTerms();
</script>

</body>
</html>
